# ─────────────────────────────────────────────────────────────────
# Nginx — HTTP-only config (active before SSL cert is obtained)
# After deploy.sh obtains the Let's Encrypt cert it replaces this
# file with nginx.ssl.conf and reloads Nginx.
# ─────────────────────────────────────────────────────────────────

# Upstream Flask/Gunicorn app container
upstream ii_app {
    server app:5050;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name _;   # matches any hostname during initial setup

    # ACME challenge path for Let's Encrypt certificate issuance
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Proxy everything else to the app during initial setup.
    # deploy.sh replaces this block with an HTTPS redirect once the cert is ready.
    location / {
        proxy_pass         http://ii_app;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_read_timeout    120s;
        proxy_send_timeout    120s;

        client_max_body_size 10M;
    }
}
