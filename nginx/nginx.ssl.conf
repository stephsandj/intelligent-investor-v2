# ─────────────────────────────────────────────────────────────────
# Nginx — Full SSL config (activated by deploy.sh after cert obtained)
# DOMAIN placeholder is replaced by deploy.sh with your real domain.
# ─────────────────────────────────────────────────────────────────

upstream ii_app {
    server app:5050;
    keepalive 32;
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name DOMAIN www.DOMAIN;

    # Still serve ACME challenges over HTTP for cert renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS server ──────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name DOMAIN www.DOMAIN;

    # ── SSL certificate (Let's Encrypt) ──────────────────────────
    ssl_certificate     /etc/letsencrypt/live/DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/DOMAIN/privkey.pem;

    # ── Modern SSL settings (A+ on SSL Labs) ─────────────────────
    ssl_protocols              TLSv1.2 TLSv1.3;
    ssl_ciphers                ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers  off;
    ssl_session_cache          shared:SSL:10m;
    ssl_session_timeout        1d;
    ssl_session_tickets        off;
    ssl_stapling               on;
    ssl_stapling_verify        on;

    # ── Security headers ─────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           DENY                                             always;
    add_header X-Content-Type-Options    nosniff                                          always;
    add_header X-XSS-Protection          "1; mode=block"                                  always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"                always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()"       always;

    # ── Logging ───────────────────────────────────────────────────
    access_log  /var/log/nginx/access.log;
    error_log   /var/log/nginx/error.log;

    # ── Proxy to Flask app ────────────────────────────────────────
    location / {
        proxy_pass         http://ii_app;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;

        proxy_connect_timeout 60s;
        proxy_read_timeout    120s;
        proxy_send_timeout    120s;

        client_max_body_size 10M;
    }

    # ── Static asset caching (PDFs served by Flask) ───────────────
    location ~* \.(pdf|js|css|png|jpg|ico|woff2?)$ {
        proxy_pass         http://ii_app;
        proxy_cache_bypass $http_upgrade;
        expires            7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    # ── Block common exploit paths ────────────────────────────────
    location ~ /\. {
        deny all;
    }
}
