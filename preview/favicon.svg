<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Terminal Investor favicon</title>
  <desc id="desc">Black rounded-square favicon with an amber T and white i monogram.</desc>
  <defs>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFC21A"/>
      <stop offset="1" stop-color="#F2A900"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1024" height="1024" rx="128" fill="#030405"/>

  <!-- White i dot -->
  <circle cx="695" cy="185" r="77" fill="#FFFFFF" filter="url(#softShadow)"/>

  <!-- Amber T -->
  <path fill="url(#amber)" filter="url(#softShadow)" d="
    M 250 307
    Q 250 281 276 281
    L 789 281
    Q 815 281 815 307
    L 815 367
    Q 815 393 789 393
    L 594 393
    L 594 876
    Q 594 902 568 902
    L 482 902
    Q 456 902 456 876
    L 456 393
    L 276 393
    Q 250 393 250 367
    Z"/>

  <!-- White i stem -->
  <rect x="628" y="424" width="149" height="490" rx="28" fill="#FFFFFF" filter="url(#softShadow)"/>
</svg>
