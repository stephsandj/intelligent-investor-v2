name: Secrets Scanning

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  secrets:
    runs-on: ubuntu-latest
    name: Detect secrets with TruffleHog

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history needed for scanning

      - name: TruffleHog Secret Scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --json

  commit-lint:
    runs-on: ubuntu-latest
    name: Prevent common secret patterns in commits

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for hardcoded secrets (basic patterns)
        run: |
          set +e
          FOUND=0

          # Scan for common secret patterns
          if git diff --cached HEAD^ HEAD | grep -iE '(password|api_key|secret|token|private_key|credentials|aws_secret|stripe_secret)' > /dev/null 2>&1; then
            echo "::error::Potential hardcoded secrets detected in latest commit"
            git diff HEAD^ HEAD | grep -iEn '(password|api_key|secret|token|private_key|credentials|aws_secret|stripe_secret)'
            FOUND=1
          fi

          # Scan for specific API key patterns
          if git diff HEAD^ HEAD | grep -E '[0-9a-zA-Z]{32,}' | grep -iE '(key|secret|token)' > /dev/null 2>&1; then
            echo "::warning::Possible API key pattern detected"
            FOUND=1
          fi

          exit $FOUND
        continue-on-error: true

  security-audit:
    runs-on: ubuntu-latest
    name: Check for known vulnerable dependencies

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install safety

      - name: Run safety audit
        run: safety check --json
        continue-on-error: true
