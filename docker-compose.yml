networks:
  ii_net:
    driver: bridge
  root_default:
    external: true
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://ii_user:${DB_PASSWORD}@db:5432/intelligentinvestor
      GUNICORN_BIND: 0.0.0.0:5050
      PORT: '5050'
      REDIS_URL: redis://redis:6379/0
    expose:
    - '5050'
    labels:
    - traefik.enable=true
    - traefik.http.routers.ii-app-http.rule=Host(`app.terminalelearn.com`)
    - traefik.http.routers.ii-app-http.entrypoints=web
    - traefik.http.routers.ii-app-http.middlewares=ii-https-redirect
    - traefik.http.middlewares.ii-https-redirect.redirectscheme.scheme=https
    - traefik.http.middlewares.ii-https-redirect.redirectscheme.permanent=true
    - traefik.http.routers.ii-app.rule=Host(`app.terminalelearn.com`)
    - traefik.http.routers.ii-app.entrypoints=websecure
    - traefik.http.routers.ii-app.tls=true
    - traefik.http.routers.ii-app.tls.certresolver=mytlschallenge
    - traefik.http.services.ii-app.loadbalancer.server.port=5050
    - traefik.docker.network=root_default
    networks:
    - ii_net
    - root_default
    restart: unless-stopped
    volumes:
    - app_logs:/app/logs
    - app_reports:/app/data
    - app_users:/app/users
  certbot:
    entrypoint: "/bin/sh -c \"\n  certbot certonly --webroot --webroot-path=/var/www/certbot\n\
      \  --email $${CERTBOT_EMAIL} --agree-tos --no-eff-email\n  -d $${DOMAIN}\n \
      \ && echo 'Certificate obtained successfully'\n\"\n"
    image: certbot/certbot:latest
    profiles:
    - certbot
    volumes:
    - certbot_certs:/etc/letsencrypt
    - certbot_www:/var/www/certbot
  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru --save ""
    expose:
    - '6379'
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
    - ii_net
    restart: unless-stopped
  db:
    environment:
      PGDATA: /var/lib/postgresql/data/pgdata
      POSTGRES_DB: intelligentinvestor
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ii_user
    expose:
    - '5432'
    healthcheck:
      interval: 10s
      retries: 5
      start_period: 20s
      test:
      - CMD-SHELL
      - pg_isready -U ii_user -d intelligentinvestor
      timeout: 5s
    image: postgres:16-alpine
    networks:
    - ii_net
    restart: unless-stopped
    volumes:
    - pg_data:/var/lib/postgresql/data
    - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
volumes:
  app_logs: null
  app_reports: null
  app_users: null
  certbot_certs: null
  certbot_www: null
  pg_data: null
