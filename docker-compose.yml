# ─────────────────────────────────────────────────────────────────
# Intelligent Investor V2 — Docker Compose (Hostinger VPS Production)
#
# Usage:
#   First deploy:  ./deploy.sh yourdomain.com you@email.com
#   Day-to-day:    docker compose up -d
#                  docker compose down
#                  docker compose logs -f app
#                  docker compose exec app bash
#                  docker compose exec db psql -U ii_user intelligentinvestor
#
# Requires a .env file with at minimum:
#   DB_PASSWORD, JWT_SECRET, (Stripe keys, etc.)
# See .env.example for the full list.
# ─────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL 16 ─────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      # ii_user is the superuser inside this container.
      # The DB is never exposed externally — only reachable on ii_net.
      POSTGRES_USER:     ii_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB:       intelligentinvestor
      PGDATA:            /var/lib/postgresql/data/pgdata
    volumes:
      - pg_data:/var/lib/postgresql/data
      # One-time init: enables pgcrypto for gen_random_uuid().
      # Only runs if PGDATA is empty (fresh container).
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    networks:
      - ii_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ii_user -d intelligentinvestor"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    # Keep Postgres data off the internet — no ports exposed to host
    expose:
      - "5432"

  # ── Flask / Gunicorn application ──────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    # Load all secrets from .env (Stripe keys, JWT secret, etc.)
    env_file: .env
    environment:
      # Override DATABASE_URL so it points to the 'db' container, not localhost
      DATABASE_URL:   postgresql://ii_user:${DB_PASSWORD}@db:5432/intelligentinvestor
      # Bind Gunicorn on all interfaces so the nginx container can reach it
      GUNICORN_BIND:  "0.0.0.0:5050"
      PORT:           "5050"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Named volumes so data survives container rebuilds
      - app_logs:/app/logs
      - app_reports:/app/data
    networks:
      - ii_net
    # Not exposed to host — only Nginx talks to it
    expose:
      - "5050"

  # ── Nginx reverse proxy + SSL termination ─────────────────────
  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Let's Encrypt certs (populated by deploy.sh / auto-renewal)
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - ii_net

  # ── Certbot (run manually via deploy.sh, not always-on) ───────
  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    # Only instantiated when explicitly called:
    #   docker compose run --rm certbot certonly ...
    profiles:
      - certbot
    entrypoint: >
      /bin/sh -c "
        certbot certonly --webroot --webroot-path=/var/www/certbot
        --email $${CERTBOT_EMAIL} --agree-tos --no-eff-email
        -d $${DOMAIN}
        && echo 'Certificate obtained successfully'
      "

# ── Named volumes ────────────────────────────────────────────────
volumes:
  pg_data:      # PostgreSQL WAL + tables — survives container rebuilds
  app_logs:     # Rotated app logs
  app_reports:  # Generated PDFs + picks JSON

  # Let's Encrypt — shared between nginx (read-only) and certbot (write)
  certbot_certs:
  certbot_www:

# ── Internal network (containers talk to each other, not the internet)
networks:
  ii_net:
    driver: bridge
