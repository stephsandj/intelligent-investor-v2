# =============================================================================
# nginx.conf — Intelligent Investor Agent
# Production Nginx configuration
#
# Place this file at: /etc/nginx/sites-available/intelligentinvestor
# Enable with: ln -s /etc/nginx/sites-available/intelligentinvestor \
#                     /etc/nginx/sites-enabled/intelligentinvestor
#
# After editing, validate and reload:
#   nginx -t && systemctl reload nginx
# =============================================================================

# ---------------------------------------------------------------------------
# Upstream
# ---------------------------------------------------------------------------
upstream app_backend {
    server 127.0.0.1:5050 fail_timeout=0;

    # Enable HTTP keep-alives to the upstream (reduces connection overhead)
    keepalive 32;
}

# ---------------------------------------------------------------------------
# Rate limiting zones
# ---------------------------------------------------------------------------

# /auth/ routes — 10 requests per minute per IP, 10 MB shared memory zone
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;

# /api/ routes — 30 requests per minute per IP, 10 MB shared memory zone
limit_req_zone $binary_remote_addr zone=api_limit:10m  rate=30r/m;

# ---------------------------------------------------------------------------
# Gzip (global defaults — also set per-server below)
# ---------------------------------------------------------------------------
gzip              on;
gzip_vary         on;
gzip_proxied      any;
gzip_comp_level   6;
gzip_min_length   1024;
gzip_buffers      16 8k;
gzip_http_version 1.1;
gzip_types
    text/plain
    text/css
    text/javascript
    text/xml
    application/json
    application/javascript
    application/x-javascript
    application/xml
    application/xml+rss
    application/atom+xml
    image/svg+xml;

# ---------------------------------------------------------------------------
# HTTP server — redirect everything to HTTPS
# ---------------------------------------------------------------------------
server {
    listen      80;
    listen      [::]:80;
    server_name _;    # catch-all; change to your domain after cert issuance

    # Allow certbot ACME challenge for initial certificate issuance
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    # All other traffic → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------------------------------------------------------------------------
# HTTPS server — main application
# ---------------------------------------------------------------------------
server {
    listen      443 ssl http2;
    listen      [::]:443 ssl http2;
    server_name REPLACE_WITH_YOUR_DOMAIN;

    # -----------------------------------------------------------------------
    # SSL (Let's Encrypt via certbot — update domain in paths below)
    # -----------------------------------------------------------------------
    ssl_certificate     /etc/letsencrypt/live/REPLACE_WITH_YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/REPLACE_WITH_YOUR_DOMAIN/privkey.pem;

    # Certbot-generated options (strong cipher suite, OCSP stapling, etc.)
    # This file is created automatically by certbot; do not modify manually.
    include     /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # -----------------------------------------------------------------------
    # Security headers
    # -----------------------------------------------------------------------

    # HTTP Strict Transport Security — 1 year, include subdomains, preload ready
    add_header Strict-Transport-Security
        "max-age=31536000; includeSubDomains; preload" always;

    # Prevent clickjacking
    add_header X-Frame-Options "DENY" always;

    # Prevent MIME-type sniffing
    add_header X-Content-Type-Options "nosniff" always;

    # Restrict referrer information
    add_header Referrer-Policy "strict-origin" always;

    # Legacy XSS filter (Belt-and-suspenders for older browsers)
    add_header X-XSS-Protection "1; mode=block" always;

    # Content Security Policy
    # Allows: self, Stripe.js (required for payment UI), inline styles (adjust
    # to use nonces in production if you can avoid unsafe-inline)
    add_header Content-Security-Policy
        "default-src 'self'; \
         script-src 'self' https://js.stripe.com https://cdn.jsdelivr.net; \
         style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; \
         font-src 'self' data: https://fonts.gstatic.com; \
         img-src 'self' data: https: blob:; \
         frame-src https://js.stripe.com https://hooks.stripe.com; \
         connect-src 'self' https://api.stripe.com; \
         object-src 'none'; \
         base-uri 'self'; \
         form-action 'self';" always;

    # Restrict browser feature access
    add_header Permissions-Policy
        "geolocation=(), microphone=(), camera=(), payment=(self)" always;

    # -----------------------------------------------------------------------
    # General settings
    # -----------------------------------------------------------------------
    client_max_body_size    10M;
    client_body_buffer_size 128k;

    # Timeouts
    client_header_timeout  15s;
    client_body_timeout    30s;
    keepalive_timeout      75s;
    send_timeout           60s;

    # Hide Nginx version from error pages and headers
    server_tokens off;

    # -----------------------------------------------------------------------
    # Gzip (per-server override for clarity)
    # -----------------------------------------------------------------------
    gzip              on;
    gzip_vary         on;
    gzip_comp_level   6;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/javascript
        image/svg+xml;

    # -----------------------------------------------------------------------
    # Stripe webhook endpoint
    # No rate limiting — Stripe sends from fixed IP ranges.
    # proxy_request_buffering off: pass the raw body unchanged so the HMAC
    # signature verification in Flask/Stripe SDK works correctly.
    # -----------------------------------------------------------------------
    location = /billing/webhook {
        proxy_pass                  http://app_backend;
        proxy_http_version          1.1;
        proxy_set_header            Connection        "";
        proxy_set_header            Host              $host;
        proxy_set_header            X-Real-IP         $remote_addr;
        proxy_set_header            X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header            X-Forwarded-Proto $scheme;

        # Do NOT buffer the body — Stripe signature checks require raw bytes
        proxy_request_buffering     off;
        proxy_buffering             off;

        proxy_read_timeout          30s;
        proxy_send_timeout          30s;
        proxy_connect_timeout       10s;
    }

    # -----------------------------------------------------------------------
    # /auth/ routes — strict rate limiting (10 req/min, burst 5)
    # -----------------------------------------------------------------------
    location /auth/ {
        limit_req        zone=auth_limit burst=5 nodelay;
        limit_req_status 429;
        limit_req_log_level warn;

        proxy_pass                  http://app_backend;
        proxy_http_version          1.1;
        proxy_set_header            Connection        "";
        proxy_set_header            Host              $host;
        proxy_set_header            X-Real-IP         $remote_addr;
        proxy_set_header            X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header            X-Forwarded-Proto $scheme;

        proxy_read_timeout          30s;
        proxy_send_timeout          30s;
        proxy_connect_timeout       10s;
    }

    # -----------------------------------------------------------------------
    # /api/ routes — moderate rate limiting (30 req/min, burst 10)
    # -----------------------------------------------------------------------
    location /api/ {
        limit_req        zone=api_limit burst=10 nodelay;
        limit_req_status 429;
        limit_req_log_level warn;

        proxy_pass                  http://app_backend;
        proxy_http_version          1.1;
        proxy_set_header            Connection        "";
        proxy_set_header            Host              $host;
        proxy_set_header            X-Real-IP         $remote_addr;
        proxy_set_header            X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header            X-Forwarded-Proto $scheme;

        # Longer timeout for potentially slow screening operations
        proxy_read_timeout          120s;
        proxy_send_timeout          120s;
        proxy_connect_timeout       10s;

        proxy_buffering             on;
        proxy_buffer_size           16k;
        proxy_buffers               8 16k;
        proxy_busy_buffers_size     32k;
    }

    # -----------------------------------------------------------------------
    # /admin/ routes — no public rate limit (auth enforced at app layer)
    # Consider IP-whitelisting this block in production
    # -----------------------------------------------------------------------
    location /admin/ {
        proxy_pass                  http://app_backend;
        proxy_http_version          1.1;
        proxy_set_header            Connection        "";
        proxy_set_header            Host              $host;
        proxy_set_header            X-Real-IP         $remote_addr;
        proxy_set_header            X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header            X-Forwarded-Proto $scheme;

        proxy_read_timeout          60s;
        proxy_send_timeout          60s;
        proxy_connect_timeout       10s;
    }

    # -----------------------------------------------------------------------
    # Static files — 1-year cache with immutable flag
    # -----------------------------------------------------------------------
    location /static/ {
        alias      /opt/intelligentinvestor/static/;
        expires    1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        access_log off;
        gzip_static on;

        # Security: only allow GET/HEAD for static assets
        limit_except GET HEAD {
            deny all;
        }
    }

    # -----------------------------------------------------------------------
    # Favicon — serve directly, suppress 404 log noise
    # -----------------------------------------------------------------------
    location = /favicon.ico {
        alias      /opt/intelligentinvestor/static/favicon.ico;
        expires    30d;
        access_log off;
        log_not_found off;
    }

    location = /robots.txt {
        alias      /opt/intelligentinvestor/static/robots.txt;
        access_log off;
        log_not_found off;
    }

    # -----------------------------------------------------------------------
    # Health check endpoint (no auth, used by load balancers / monitoring)
    # -----------------------------------------------------------------------
    location = /health {
        proxy_pass         http://app_backend;
        proxy_set_header   Host $host;
        access_log         off;
        proxy_read_timeout 5s;
    }

    # -----------------------------------------------------------------------
    # Default proxy block — all other routes
    # -----------------------------------------------------------------------
    location / {
        proxy_pass                  http://app_backend;
        proxy_http_version          1.1;
        proxy_set_header            Connection        "";
        proxy_set_header            Host              $host;
        proxy_set_header            X-Real-IP         $remote_addr;
        proxy_set_header            X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header            X-Forwarded-Proto $scheme;

        proxy_read_timeout          90s;
        proxy_send_timeout          90s;
        proxy_connect_timeout       10s;

        proxy_buffering             on;
        proxy_buffer_size           16k;
        proxy_buffers               8 16k;
        proxy_busy_buffers_size     32k;
    }

    # -----------------------------------------------------------------------
    # Custom error responses
    # -----------------------------------------------------------------------
    error_page 429 /errors/429.json;
    error_page 500 502 503 504 /errors/50x.json;

    location /errors/ {
        internal;
        root /opt/intelligentinvestor;
        add_header Content-Type application/json always;
    }

    # -----------------------------------------------------------------------
    # Logging
    # -----------------------------------------------------------------------
    access_log /var/log/nginx/intelligentinvestor_access.log combined;
    error_log  /var/log/nginx/intelligentinvestor_error.log  warn;
}
